[workspace]
authors = ["Adam D. Hines <adam.hines@qut.edu.au>, Gokul B. Nair, Michael Milford, Tobias Fischer"]
channels = ["conda-forge"]
name = "EventGeM"
platforms = ["linux-64", "linux-aarch64"]
version = "0.1.0"

[system-requirements]
cuda = "12"

[tasks]

[dependencies]
python = ">3.8"
numpy = "*"
pytorch = "*"
sinabs = "*"
torchvision = "*"
pytorch-lightning  = "*"
einops = "*"
timm = "*"
yaml = "*"
pyyaml = "*"
flatten-dict = "*"
opencv = "*"
tqdm = "*"
scikit-learn = "*"
pynmea2 = "*"
pyarrow = "*"
cmapy = "*"
contourpy = "*"
cycler = "*"
filelock = "*"
fonttools = "*" 
fsspec = "*"
h5py = "*"
hdf5plugin = "*"
imageio = "*"
Jinja2 = "*"
joblib = "*"
kiwisolver = "*"
kornia = "*"
lazy_loader = "*"
llvmlite = "*"
MarkupSafe = "*"
matplotlib = "*"
mpmath = "*"
networkx = "*"
numba = "*"
packaging = "*"
pillow = "*"
pyparsing = "*"
python-dateutil = "*"
scikit-image = "*"
scipy = "*"
six = "*"
sympy = "*"
threadpoolctl = "*"
tifffile = "*"
torchaudio = "*"
triton = "*"
typing_extensions = "*"
prettytable = "*"

[pypi-dependencies]
dv-processing = "*"

[target.linux-64.dependencies]
cuda-version = "12.*"
pytorch-gpu = "*"
cuda-cudart-dev = "*"
cuda-crt = "*"
cudnn = "*"
libcusparse-dev = "*"
cuda-driver-dev = "*"
